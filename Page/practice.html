<!DOCTYPE html>
<html lang=""en-US">

<head>
    <meta charset=""UTF-8">
    <title>Practice</title>
</head>

<body>
    <div class=""container">
        <h1> Practice Form</h1>
    <form>
        <fieldset>
            <legend> Name, DOB & Gender</legend>

            <table>
                <tr>
                    <td> <label for="name"> Name: </label> </td>
                    <td>
                        <input type="text" id="firstName" name="firstName" placeholder="First Name">
                        <input type="text" id="lastName" name="lastName" placeholder="Last Name">
                    </td>
                </tr>
                <tr>
                    <td> <label for="age"> Age: </label> </td>
                    <td>
                        <input type="number" id="age" name="age">
                    </td>
                </tr>
                <tr>
                    <td> <label for="language"> Language: </label> </td>
                    <td> 
                        <select id="language"> 
                            <option id="english" value="english">English</option>
                            <option id="spanish" value="spanish">Spanish</option>
                            <option id="french" value="french">French</option>
                            <option id="bangla" value="bangla">Bangla</option>
                        </select>
                    </td>   
                </tr>
                <tr>
                    <td> <label for="Subject"> Subject: </label> </td>
                    <td>
                        <input type="checkbox" id="math" name="math" value="math">
                        <label for="math">Math</label>
                        <input type="checkbox" id="science" name="science" value="science">
                        <label for="science">Science</label>
                        <input type="checkbox" id="history" name="history" value="history">
                        <label for="history">History</label>
                </tr>
            </table>
        </fieldset>
    </form>

    </div>
</body>


</html>
