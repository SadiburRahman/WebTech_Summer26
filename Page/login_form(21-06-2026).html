<!DOCTYPE html>
<html lang="en-US">

<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="../Design/style.css">
    <title>Signup</title>
</head>

<body>
    <div class="container">
        <form>
            <fieldset>
                <table>
                    <tr>
                        <td>
                            <label for="login" style="font-size: 28px; font-weight: bold;"> Login </label>
                        </td>
                    </tr>
                    
                    <tr>
                        <td>
                            <input type="email" id="email" name="email" placeholder="Email">
                        </td>   
                    </tr>
                    
                    <tr>
                        <td>
                            <input type="password" id="password" name="password" placeholder="Password">
                        </td>   
                    </tr>
                    <tr>
                        <td>
                            <input type="submit" value="Login">
                        </td>   
                    </tr>
                    <tr>
                        <td>
                            <label for="signUp">Don't have an account? </label>
                            <label for="signUp" style="color: #242f97;"> Sign up </label>
                        </td>   
                    </tr>
                </table>
            </fieldset>
                
        </form>
    </div>
</body>
