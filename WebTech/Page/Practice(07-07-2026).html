<!DOCTYPE html>
<html lang="en-US">
    <head>
        <meta charset="UTF-8">
        <link rel="stylesheet" href="../Design/style(06-07-2026).css">
        <title>Practice</title>
    </head>
    <body>
        <div class="container">
            <h1 title="Alhamdulillah">Practice</h1>
            <p>This is a practice page for web development.</p>
            <form>  
                <fieldset>
                    <legend>Personal Information</legend>
                    <label for="name">Name:</label>
                    <input type="text" title="Must be filled" id="name" name="name" required><br><br>
                    <label for="email">Email:</label>
                    <input type="email" id="email" name="email" required><br><br>
                    <label for="age">Age:</label>
                    <input type="number" id="age" name="age" min="1" max="120"><br><br>
                    <input type="submit" title="Double click here to submit" value="Submit">
            </form>
